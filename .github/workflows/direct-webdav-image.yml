name: Direct WebDAV Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=2.3
            CHANNEL=direct-webdav
          tags: |
            ghcr.io/${{ github.repository_owner }}/decypharr:direct-webdav
            ghcr.io/${{ github.repository_owner }}/decypharr:direct-webdav-${{ github.sha }}
          cache-from: type=gha,scope=direct-webdav-amd64
          cache-to: type=gha,scope=direct-webdav-amd64,mode=max
